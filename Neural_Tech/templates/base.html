<!DOCTYPE html>
 {% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}NeuralTech{% endblock %}</title>

    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" href="{% static 'images/tecnologia.png' %}" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/globalStyles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
 <!-- SCANLINE OVERLAY -->
    <div class="scanlines"></div>

    <!-- CURSOR GLOW -->
    <div class="cursor-glow" id="cursorGlow"></div>

   {% include 'header.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <!-- Espacio para scripts adicionales por página -->
    {% block extra_js %}{% endblock %}
<!-- Bootstrap JS -->
  <script src="{% static 'js/scripts.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
